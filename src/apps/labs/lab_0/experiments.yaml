experiments:
  lab0-source-inventory:
    app_name: workshop-lab0-source-inventory
    observability:
      enabled: false
      persist: false
    artifacts:
      inputs:
        vendors:
          format: delta
          path: ${LAB0_VENDORS_PATH:-s3a://lakehouse/bronze/retail/vendors}
        products:
          format: delta
          path: ${LAB0_PRODUCTS_PATH:-s3a://lakehouse/bronze/retail/products}
        customers:
          format: delta
          path: ${LAB0_CUSTOMERS_PATH:-s3a://lakehouse/bronze/retail/customers}
        sales:
          format: delta
          path: ${LAB0_SALES_PATH:-s3a://lakehouse/bronze/retail/sales}

  lab0-sparkmeasure-native-api:
    app_name: workshop-lab0-sparkmeasure-native-api
    observability:
      enabled: false
      persist: false
    artifacts:
      inputs:
        sales:
          format: delta
          path: ${LAB0_SALES_PATH:-s3a://lakehouse/bronze/retail/sales}
        vendors:
          format: delta
          path: ${LAB0_VENDORS_PATH:-s3a://lakehouse/bronze/retail/vendors}
        products:
          format: delta
          path: ${LAB0_PRODUCTS_PATH:-s3a://lakehouse/bronze/retail/products}

  lab0-sparkmeasure-presentation-native:
    app_name: workshop-lab0-sparkmeasure-presentation-native
    observability:
      enabled: false
      persist: false
    artifacts:
      inputs:
        sales:
          format: delta
          path: ${LAB0_SALES_PATH:-s3a://lakehouse/bronze/retail/sales}
        vendors:
          format: delta
          path: ${LAB0_VENDORS_PATH:-s3a://lakehouse/bronze/retail/vendors}
        products:
          format: delta
          path: ${LAB0_PRODUCTS_PATH:-s3a://lakehouse/bronze/retail/products}
      outputs:
        sales_enriched:
          format: delta
          path: ${LAB0_SALES_ENRICHED_PATH:-s3a://lakehouse/silver/lab0/sales_enriched}
          mode: overwrite
          options:
            overwriteSchema: true

  lab0-sparkmeasure-presentation-observed:
    app_name: workshop-lab0-sparkmeasure-presentation-observed
    observability:
      enabled: true
      collector: stage
      persist: false
      output_artifact: metrics
    artifacts:
      inputs:
        sales:
          format: delta
          path: ${LAB0_SALES_PATH:-s3a://lakehouse/bronze/retail/sales}
        vendors:
          format: delta
          path: ${LAB0_VENDORS_PATH:-s3a://lakehouse/bronze/retail/vendors}
        products:
          format: delta
          path: ${LAB0_PRODUCTS_PATH:-s3a://lakehouse/bronze/retail/products}
      outputs:
        sales_enriched:
          format: delta
          path: ${LAB0_SALES_ENRICHED_PATH:-s3a://lakehouse/silver/lab0/sales_enriched}
          mode: overwrite
          options:
            overwriteSchema: true
        metrics:
          format: delta
          path: ${LAB0_SPARKMEASURE_METRICS_PATH:-s3a://observability/spark-measure/lab0/presentation/latest}
          mode: overwrite
          options:
            overwriteSchema: true
