experiments:
  lab1-global-sort-diagnosis-native:
    app_name: workshop-lab1-global-sort-native
    observability:
      enabled: false
      persist: false
    artifacts:
      inputs:
        sales:
          format: delta
          path: ${LAB1_SALES_PATH:-s3a://lakehouse/bronze/retail/sales}
        vendors:
          format: delta
          path: ${LAB1_VENDORS_PATH:-s3a://lakehouse/bronze/retail/vendors}
        products:
          format: delta
          path: ${LAB1_PRODUCTS_PATH:-s3a://lakehouse/bronze/retail/products}
      outputs:
        top_sales_global_sort:
          format: delta
          path: ${LAB1_TOP_SALES_GLOBAL_SORT_PATH:-s3a://lakehouse/gold/lab1/top_sales_global_sort}
          mode: overwrite
          options:
            overwriteSchema: true

  lab1-global-sort-diagnosis-observed-stage:
    app_name: workshop-lab1-global-sort-observed-stage
    observability:
      enabled: true
      collector: stage
      persist: false
      output_artifact: metrics
    artifacts:
      inputs:
        sales:
          format: delta
          path: ${LAB1_SALES_PATH:-s3a://lakehouse/bronze/retail/sales}
        vendors:
          format: delta
          path: ${LAB1_VENDORS_PATH:-s3a://lakehouse/bronze/retail/vendors}
        products:
          format: delta
          path: ${LAB1_PRODUCTS_PATH:-s3a://lakehouse/bronze/retail/products}
      outputs:
        top_sales_global_sort:
          format: delta
          path: ${LAB1_TOP_SALES_GLOBAL_SORT_PATH:-s3a://lakehouse/gold/lab1/top_sales_global_sort}
          mode: overwrite
          options:
            overwriteSchema: true
        metrics:
          format: delta
          path: ${LAB1_SPARKMEASURE_METRICS_PATH:-s3a://observability/spark-measure/lab1/global-sort/latest}
          mode: overwrite
          options:
            overwriteSchema: true

  lab1-random-task-outlier-stage:
    app_name: workshop-lab1-random-task-outlier-stage
    workload:
      variant: problematic
      success_marker: LAB1_RANDOM_TASK_OUTLIER_STAGE_OK
    spark:
      config:
        spark.sql.shuffle.partitions: 64
    observability:
      enabled: true
      collector: stage
      persist: false
    artifacts:
      inputs:
        sales:
          format: delta
          path: ${LAB1_SALES_PATH:-s3a://lakehouse/bronze/retail/sales}
        vendors:
          format: delta
          path: ${LAB1_VENDORS_PATH:-s3a://lakehouse/bronze/retail/vendors}
        products:
          format: delta
          path: ${LAB1_PRODUCTS_PATH:-s3a://lakehouse/bronze/retail/products}
      outputs:
        audit_outlier:
          format: delta
          path: ${LAB1_RANDOM_TASK_OUTLIER_PATH:-s3a://lakehouse/gold/lab1/random_task_outlier/problematic}
          mode: overwrite
          options:
            overwriteSchema: true

  lab1-random-task-outlier-task:
