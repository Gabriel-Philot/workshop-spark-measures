experiments:
  lab2-shuffle-aggregation-baseline:
    app_name: workshop-lab2-shuffle-aggregation-baseline
    workload:
      variant: baseline
      success_marker: LAB2_SHUFFLE_AGGREGATION_BASELINE_OK
      shuffle_partitions: 96
      round_robin_partitions: 1024
    spark:
      config:
        spark.sql.shuffle.partitions: 96
    observability:
      enabled: true
      collector: stage
      persist: false
    artifacts:
      inputs:
        sales:
          format: delta
          path: ${LAB2_SALES_PATH:-s3a://lakehouse/bronze/retail/sales}
        vendors:
          format: delta
          path: ${LAB2_VENDORS_PATH:-s3a://lakehouse/bronze/retail/vendors}
      outputs:
        regional_monthly_sales:
          format: delta
          path: ${LAB2_SHUFFLE_AGGREGATION_BASELINE_PATH:-s3a://lakehouse/gold/lab2/shuffle_aggregation/baseline}
          mode: overwrite
          options:
            overwriteSchema: true

  lab2-shuffle-aggregation-optimized:
    app_name: workshop-lab2-shuffle-aggregation-optimized
    workload:
      variant: optimized
      success_marker: LAB2_SHUFFLE_AGGREGATION_OPTIMIZED_OK
      shuffle_partitions: 96
      keyed_partitions: 32
    spark:
      config:
        spark.sql.shuffle.partitions: 96
    observability:
      enabled: true
      collector: stage
      persist: false
    artifacts:
      inputs:
        sales:
          format: delta
          path: ${LAB2_SALES_PATH:-s3a://lakehouse/bronze/retail/sales}
        vendors:
          format: delta
          path: ${LAB2_VENDORS_PATH:-s3a://lakehouse/bronze/retail/vendors}
      outputs:
        regional_monthly_sales:
          format: delta
          path: ${LAB2_SHUFFLE_AGGREGATION_OPTIMIZED_PATH:-s3a://lakehouse/gold/lab2/shuffle_aggregation/optimized}
          mode: overwrite
          options:
            overwriteSchema: true

  lab2-stage-metrics-drill-default:
    app_name: workshop-lab2-stage-metrics-drill-default
    workload:
      variant: default
      success_marker: LAB2_STAGE_METRICS_DRILL_DEFAULT_OK
      keyed_partitions: 32
      round_robin_partitions: 96
    spark:
      config:
        spark.sql.shuffle.partitions: 96
    observability:
      enabled: true
      collector: stage
      persist: false
    artifacts:
      inputs:
        sales:
          format: delta
          path: ${LAB2_SALES_PATH:-s3a://lakehouse/bronze/retail/sales}
        vendors:
          format: delta
          path: ${LAB2_VENDORS_PATH:-s3a://lakehouse/bronze/retail/vendors}
        products:
          format: delta
          path: ${LAB2_PRODUCTS_PATH:-s3a://lakehouse/bronze/retail/products}
      outputs:
        stage_metrics_summary:
          format: delta
          path: ${LAB2_STAGE_METRICS_DRILL_DEFAULT_PATH:-s3a://lakehouse/gold/lab2/stage_metrics_drill/default}
          mode: overwrite
          options:
            overwriteSchema: true

  lab2-stage-metrics-drill-pressure:
    app_name: workshop-lab2-stage-metrics-drill-pressure
    workload:
      variant: pressure
      success_marker: LAB2_STAGE_METRICS_DRILL_PRESSURE_OK
      keyed_partitions: 32
      round_robin_partitions: 512
    spark:
      config:
        spark.sql.shuffle.partitions: 96
    observability:
      enabled: true
      collector: stage
      persist: false
    artifacts:
      inputs:
        sales:
          format: delta
          path: ${LAB2_SALES_PATH:-s3a://lakehouse/bronze/retail/sales}
        vendors:
          format: delta
          path: ${LAB2_VENDORS_PATH:-s3a://lakehouse/bronze/retail/vendors}
        products:
          format: delta
          path: ${LAB2_PRODUCTS_PATH:-s3a://lakehouse/bronze/retail/products}
      outputs:
        stage_metrics_summary:
          format: delta
          path: ${LAB2_STAGE_METRICS_DRILL_PRESSURE_PATH:-s3a://lakehouse/gold/lab2/stage_metrics_drill/pressure}
          mode: overwrite
          options:
            overwriteSchema: true

  lab2c-task-skew-task:
    app_name: workshop-lab2c-task-skew-task
    workload:
      variant: skewed
      success_marker: LAB2C_TASK_SKEW_TASK_OK
      shuffle_partitions: 27
    spark:
      config:
        spark.sql.shuffle.partitions: 27
        spark.sql.adaptive.enabled: false
        spark.sql.autoBroadcastJoinThreshold: -1
    observability:
      enabled: true
      collector: task
      persist: false
    artifacts:
      inputs:
        sales:
          format: delta
          path: ${LAB2_SALES_PATH:-s3a://lakehouse/bronze/retail/sales}
        vendors:
          format: delta
          path: ${LAB2_VENDORS_PATH:-s3a://lakehouse/bronze/retail/vendors}
      outputs:
        vendor_sales_skew_summary:
          format: delta
          path: ${LAB2C_TASK_SKEW_TASK_PATH:-s3a://lakehouse/gold/lab2/task_skew/task}
          mode: overwrite
          options:
            overwriteSchema: true

  lab2d-empty-partitions-task:
    app_name: workshop-lab2d-empty-partitions-task
    workload:
      variant: empty
      success_marker: LAB2D_EMPTY_PARTITIONS_TASK_OK
      shuffle_partitions: 27
      active_buckets: 48
    spark:
      config:
        spark.sql.shuffle.partitions: 27
        spark.sql.adaptive.enabled: false
    observability:
      enabled: true
      collector: task
      persist: false
    artifacts:
      inputs:
        sales:
          format: delta
          path: ${LAB2_SALES_PATH:-s3a://lakehouse/bronze/retail/sales}
      outputs:
        empty_partitions_summary:
          format: delta
          path: ${LAB2D_EMPTY_PARTITIONS_TASK_PATH:-s3a://lakehouse/gold/lab2/empty_partitions/task}
          mode: overwrite
          options:
            overwriteSchema: true
