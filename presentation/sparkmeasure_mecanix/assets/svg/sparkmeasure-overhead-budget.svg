<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 520" role="img" aria-labelledby="title desc">
  <title id="title">sparkMeasure overhead budget</title>
  <desc id="desc">Technical diagram showing event delivery, listener processing, driver memory and external sink overhead.</desc>
  <defs>
    <filter id="cyanGlow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="orangeGlow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#111820"/><stop offset="1" stop-color="#070b0f"/></linearGradient>
    <marker id="arrowC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#25d6e8"/></marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#ff7a18"/></marker>
  </defs>

  <rect x="1" y="1" width="1318" height="518" rx="24" fill="url(#bg)" stroke="#1c6c78" stroke-width="2"/>
  <g opacity=".22" stroke="#26343d"><path d="M72 82h1176M72 174h1176M72 266h1176M72 358h1176M72 450h1176"/><path d="M180 46v420M360 46v420M540 46v420M720 46v420M900 46v420M1080 46v420"/></g>

  <text x="58" y="54" fill="#f5f8fa" font-family="Consolas, monospace" font-size="18" font-weight="800" letter-spacing="3">OVERHEAD BUDGET</text>
  <text x="58" y="82" fill="#91a3b1" font-family="Inter, Arial, sans-serif" font-size="16">o custo cresce com eventos processados, dados guardados e bytes exportados</text>

  <g transform="translate(58 118)">
    <rect width="245" height="116" rx="16" fill="#0a1015" stroke="#25d6e8"/>
    <text x="20" y="34" fill="#25d6e8" font-family="Consolas, monospace" font-size="17" font-weight="800">Spark events</text>
    <text x="20" y="66" fill="#d8e1e8" font-family="Inter, Arial, sans-serif" font-size="17">StageCompleted</text>
    <text x="20" y="92" fill="#d8e1e8" font-family="Inter, Arial, sans-serif" font-size="17">TaskEnd / metrics</text>
  </g>
  <path d="M320 176h132" stroke="#25d6e8" stroke-width="4" marker-end="url(#arrowC)" filter="url(#cyanGlow)"/>

  <g transform="translate(468 118)">
    <rect width="250" height="116" rx="16" fill="#0a1015" stroke="#ff7a18"/>
    <text x="20" y="34" fill="#ff7a18" font-family="Consolas, monospace" font-size="17" font-weight="800">Listener callback</text>
    <text x="20" y="66" fill="#d8e1e8" font-family="Inter, Arial, sans-serif" font-size="17">extract + flatten</text>
    <text x="20" y="92" fill="#d8e1e8" font-family="Inter, Arial, sans-serif" font-size="17">StageVals / TaskVals</text>
  </g>
  <path d="M735 176h132" stroke="#ff7a18" stroke-width="4" marker-end="url(#arrowO)" filter="url(#orangeGlow)"/>

  <g transform="translate(884 118)">
    <rect width="250" height="116" rx="16" fill="#0a1015" stroke="#7ddc9f"/>
    <text x="20" y="34" fill="#7ddc9f" font-family="Consolas, monospace" font-size="17" font-weight="800">Driver buffer</text>
    <text x="20" y="66" fill="#d8e1e8" font-family="Inter, Arial, sans-serif" font-size="17">ListBuffer in heap</text>
    <text x="20" y="92" fill="#d8e1e8" font-family="Inter, Arial, sans-serif" font-size="17">report / DataFrame</text>
  </g>
  <path d="M1148 176h78" stroke="#7ddc9f" stroke-width="4" marker-end="url(#arrowC)"/>
  <text x="1228" y="181" fill="#91a3b1" font-family="Consolas, monospace" font-size="14">sink</text>

  <g transform="translate(84 288)">
    <rect width="520" height="120" rx="18" fill="#0b1116" stroke="#7ddc9f"/>
    <text x="24" y="38" fill="#7ddc9f" font-family="Consolas, monospace" font-size="18" font-weight="800">StageMetrics</text>
    <text x="24" y="70" fill="#f5f8fa" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900">StageM</text>
    <text x="245" y="70" fill="#b9c6d0" font-family="Inter, Arial, sans-serif" font-size="18">ex.: 8 stages -> 8 registros</text>
    <rect x="24" y="88" width="70" height="14" rx="7" fill="#7ddc9f"/><rect x="102" y="88" width="70" height="14" rx="7" fill="#7ddc9f"/><rect x="180" y="88" width="70" height="14" rx="7" fill="#7ddc9f"/>
  </g>

  <g transform="translate(716 288)">
    <rect width="520" height="120" rx="18" fill="#0b1116" stroke="#ff7a18"/>
    <text x="24" y="38" fill="#ff7a18" font-family="Consolas, monospace" font-size="18" font-weight="800">TaskMetrics</text>
    <text x="24" y="70" fill="#f5f8fa" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900">TaskM</text>
    <text x="240" y="70" fill="#b9c6d0" font-family="Inter, Arial, sans-serif" font-size="18">ex.: 160k tasks -> 160k registros</text>
    <g fill="#ff7a18" filter="url(#orangeGlow)">
      <rect x="24" y="88" width="28" height="14" rx="7"/><rect x="60" y="88" width="28" height="14" rx="7"/><rect x="96" y="88" width="28" height="14" rx="7"/><rect x="132" y="88" width="28" height="14" rx="7"/><rect x="168" y="88" width="28" height="14" rx="7"/><rect x="204" y="88" width="28" height="14" rx="7"/><rect x="240" y="88" width="28" height="14" rx="7"/><rect x="276" y="88" width="28" height="14" rx="7"/><rect x="312" y="88" width="28" height="14" rx="7"/><rect x="348" y="88" width="28" height="14" rx="7"/>
    </g>
  </g>

  <g font-family="Consolas, monospace" font-size="15" fill="#ffd0a5">
    <text x="88" y="462">event delivery</text>
    <text x="318" y="462">listener processing</text>
    <text x="584" y="462">driver memory</text>
    <text x="820" y="462">sink serialization / I/O</text>
  </g>
</svg>