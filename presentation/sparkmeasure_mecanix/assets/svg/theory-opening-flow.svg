<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Fluxo interno do Spark ate o sparkMeasure</title>
  <desc id="desc">Spark SQL passa pelo scheduler, ListenerBus, sparkMeasure e vira diagnostico operacional.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#091625"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" x2="1">
      <stop offset="0" stop-color="#ff6f00"/>
      <stop offset="1" stop-color="#ffb020"/>
    </linearGradient>
    <linearGradient id="event" x1="0" x2="1">
      <stop offset="0" stop-color="#21c7d9"/>
      <stop offset="1" stop-color="#6ee7b7"/>
    </linearGradient>
    <filter id="glowSpark" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowEvent" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowCyan" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto">
      <path d="M2 2 L9 6 L2 10" fill="none" stroke="#21c7d9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowSpark" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto">
      <path d="M2 2 L9 6 L2 10" fill="none" stroke="#ff8a16" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="980" height="360" rx="28" fill="#030712"/>
  <rect x="18" y="18" width="944" height="324" rx="24" fill="url(#panel)" stroke="#17324a" stroke-width="1.4"/>

  <g opacity=".18">
    <path d="M0 70H980M0 140H980M0 210H980M0 280H980" stroke="#8ab4c6" stroke-width="1"/>
    <path d="M90 0V360M210 0V360M330 0V360M450 0V360M570 0V360M690 0V360M810 0V360M930 0V360" stroke="#8ab4c6" stroke-width="1"/>
  </g>

  <g transform="translate(82 83)" filter="url(#glowSpark)">
    <circle cx="0" cy="0" r="7" fill="#ff8a16"/>
    <path d="M0 0 L54 -38 M0 0 L66 8 M0 0 L38 58 M0 0 L-52 32 M0 0 L-44 -36" stroke="url(#spark)" stroke-width="7" stroke-linecap="round"/>
    <path d="M0 0 L68 -4 M0 0 L8 73" stroke="#21c7d9" stroke-width="5" stroke-linecap="round"/>
    <circle cx="54" cy="-38" r="8" fill="#21c7d9"/>
    <circle cx="66" cy="8" r="8" fill="#21c7d9"/>
    <circle cx="38" cy="58" r="8" fill="#21c7d9"/>
    <circle cx="-52" cy="32" r="8" fill="#21c7d9"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="800">
    <g transform="translate(62 210)">
      <rect width="132" height="66" rx="14" fill="#071421" stroke="#ff8a16" stroke-width="1.6"/>
      <text x="66" y="28" text-anchor="middle" fill="#ffb020" font-size="18">Spark SQL</text>
      <text x="66" y="49" text-anchor="middle" fill="#dbeafe" font-size="12">DataFrame / SQL</text>
    </g>

    <g transform="translate(254 210)">
      <rect width="132" height="66" rx="14" fill="#071421" stroke="#244e69" stroke-width="1.6"/>
      <text x="66" y="28" text-anchor="middle" fill="#e7f7ff" font-size="18">Scheduler</text>
      <text x="66" y="49" text-anchor="middle" fill="#a6bed1" font-size="12">jobs / stages</text>
    </g>

    <g transform="translate(446 210)">
      <rect width="132" height="66" rx="14" fill="#071421" stroke="#21c7d9" stroke-width="1.8"/>
      <text x="66" y="28" text-anchor="middle" fill="#67e8f9" font-size="18">ListenerBus</text>
      <text x="66" y="49" text-anchor="middle" fill="#a6bed1" font-size="12">event queue</text>
    </g>

    <g transform="translate(638 210)">
      <rect width="132" height="66" rx="14" fill="#071421" stroke="#ff8a16" stroke-width="1.8"/>
      <text x="66" y="28" text-anchor="middle" fill="#ffb020" font-size="18">sparkMeasure</text>
      <text x="66" y="49" text-anchor="middle" fill="#a6bed1" font-size="12">listeners</text>
    </g>

    <g transform="translate(830 210)">
      <rect width="100" height="66" rx="14" fill="#06131b" stroke="#6ee7b7" stroke-width="1.8"/>
      <text x="50" y="28" text-anchor="middle" fill="#6ee7b7" font-size="18">Diagnostico</text>
      <text x="50" y="49" text-anchor="middle" fill="#a6bed1" font-size="12">evidencia</text>
    </g>
  </g>

  <path d="M198 243H244" stroke="#21c7d9" stroke-width="3" marker-end="url(#arrowCyan)" filter="url(#glowEvent)"/>
  <path d="M390 243H436" stroke="#21c7d9" stroke-width="3" marker-end="url(#arrowCyan)" filter="url(#glowEvent)"/>
  <path d="M582 243H628" stroke="#ff8a16" stroke-width="3" marker-end="url(#arrowSpark)" filter="url(#glowSpark)"/>
  <path d="M774 243H820" stroke="#6ee7b7" stroke-width="3" marker-end="url(#arrowCyan)" filter="url(#glowEvent)"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="62" y="52" fill="#e7f7ff" font-size="25" font-weight="900">runtime Spark como fonte de sinais</text>
    <text x="62" y="82" fill="#9fb4c7" font-size="15">eventos ja emitidos pelo Spark viram material de diagnostico</text>
    <text x="638" y="104" fill="#ffb020" font-size="13" font-weight="900" letter-spacing="1.8">ADD SPARK LISTENER</text>
    <path d="M704 114 C704 148 704 170 704 203" stroke="#ff8a16" stroke-width="2" stroke-dasharray="5 8" marker-end="url(#arrowSpark)"/>
  </g>

  <g transform="translate(295 108)" opacity=".95">
    <rect width="260" height="58" rx="12" fill="#04111d" stroke="#18384f"/>
    <text x="18" y="25" fill="#6ee7b7" font-family="Consolas, monospace" font-size="13">SparkListenerEvent</text>
    <text x="18" y="44" fill="#7dd3fc" font-family="Consolas, monospace" font-size="13">TaskEnd | StageCompleted</text>
  </g>
</svg>
