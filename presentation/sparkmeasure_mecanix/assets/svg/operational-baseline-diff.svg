<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 560" role="img" aria-labelledby="title desc">
  <title id="title">Operational baseline diff</title>
  <desc id="desc">Pipeline from metrics per run to baseline, diff, regression marker and tuning decision.</desc>
  <defs>
    <filter id="glowC" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowO" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#111820"/><stop offset="1" stop-color="#070b0f"/></linearGradient>
    <marker id="arrowC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#25d6e8"/></marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#ff7a18"/></marker>
  </defs>

  <rect x="1" y="1" width="1318" height="558" rx="24" fill="url(#bg)" stroke="#1c6c78" stroke-width="2"/>
  <g opacity=".20" stroke="#26343d"><path d="M72 86h1176M72 178h1176M72 270h1176M72 362h1176M72 454h1176"/><path d="M180 50v460M360 50v460M540 50v460M720 50v460M900 50v460M1080 50v460"/></g>

  <text x="58" y="56" fill="#f5f8fa" font-family="Consolas, monospace" font-size="18" font-weight="800" letter-spacing="3">METRICS PER RUN</text>
  <text x="58" y="84" fill="#91a3b1" font-family="Inter, Arial, sans-serif" font-size="16">run metadata + spark metrics + baseline comparison</text>

  <g transform="translate(62 125)">
    <rect width="220" height="118" rx="16" fill="#0a1015" stroke="#7ddc9f"/>
    <text x="18" y="34" fill="#7ddc9f" font-family="Consolas, monospace" font-size="16" font-weight="800">run record</text>
    <text x="18" y="64" fill="#d8e1e8" font-family="Inter, Arial, sans-serif" font-size="16">commit + config</text>
    <text x="18" y="90" fill="#d8e1e8" font-family="Inter, Arial, sans-serif" font-size="16">input + metrics</text>
  </g>
  <path d="M302 184h96" stroke="#25d6e8" stroke-width="4" marker-end="url(#arrowC)" filter="url(#glowC)"/>

  <g transform="translate(418 125)">
    <rect width="220" height="118" rx="16" fill="#0a1015" stroke="#25d6e8"/>
    <text x="18" y="34" fill="#25d6e8" font-family="Consolas, monospace" font-size="16" font-weight="800">baseline</text>
    <text x="18" y="64" fill="#d8e1e8" font-family="Inter, Arial, sans-serif" font-size="16">stable input</text>
    <text x="18" y="90" fill="#d8e1e8" font-family="Inter, Arial, sans-serif" font-size="16">known config</text>
  </g>
  <path d="M658 184h96" stroke="#25d6e8" stroke-width="4" marker-end="url(#arrowC)" filter="url(#glowC)"/>

  <g transform="translate(774 125)">
    <rect width="220" height="118" rx="16" fill="#0a1015" stroke="#ff7a18"/>
    <text x="18" y="34" fill="#ff7a18" font-family="Consolas, monospace" font-size="16" font-weight="800">diff</text>
    <text x="18" y="64" fill="#d8e1e8" font-family="Inter, Arial, sans-serif" font-size="16">duration +38%</text>
    <text x="18" y="90" fill="#d8e1e8" font-family="Inter, Arial, sans-serif" font-size="16">shuffle +75%</text>
  </g>
  <path d="M1014 184h96" stroke="#ff7a18" stroke-width="4" marker-end="url(#arrowO)" filter="url(#glowO)"/>

  <g transform="translate(1130 125)">
    <rect width="130" height="118" rx="16" fill="#0a1015" stroke="#ff7a18"/>
    <text x="18" y="34" fill="#ff7a18" font-family="Consolas, monospace" font-size="16" font-weight="800">decision</text>
    <text x="18" y="64" fill="#d8e1e8" font-family="Inter, Arial, sans-serif" font-size="15">regress</text>
    <text x="18" y="90" fill="#d8e1e8" font-family="Inter, Arial, sans-serif" font-size="15">tune</text>
  </g>

  <g transform="translate(90 310)">
    <rect width="1140" height="150" rx="18" fill="#0b1116" stroke="#2b3942"/>
    <text x="26" y="38" fill="#f5f8fa" font-family="Consolas, monospace" font-size="16" font-weight="800">diff query result</text>
    <g font-family="Consolas, monospace" font-size="15">
      <text x="26" y="78" fill="#91a3b1">metric</text><text x="265" y="78" fill="#91a3b1">baseline</text><text x="450" y="78" fill="#91a3b1">current</text><text x="640" y="78" fill="#91a3b1">delta</text><text x="810" y="78" fill="#91a3b1">action</text>
      <text x="26" y="112" fill="#7ddc9f">shuffleBytesWritten</text><text x="265" y="112" fill="#d8e1e8">12.2TB</text><text x="450" y="112" fill="#d8e1e8">21.4TB</text><text x="640" y="112" fill="#ff7a18">+75%</text><text x="810" y="112" fill="#ffd0a5">inspect join / partitions</text>
      <text x="26" y="138" fill="#7ddc9f">executorCpuTime/runTime</text><text x="265" y="138" fill="#d8e1e8">0.71</text><text x="450" y="138" fill="#d8e1e8">0.40</text><text x="640" y="138" fill="#ff7a18">-44%</text><text x="810" y="138" fill="#ffd0a5">I/O or shuffle wait</text>
    </g>
  </g>

  <g transform="translate(94 498)" font-family="Consolas, monospace" font-size="15">
    <text x="0" y="0" fill="#25d6e8">persist:</text>
    <text x="78" y="0" fill="#d8e1e8">run_id, commit, config, input_size, Spark version, metric set</text>
    <text x="690" y="0" fill="#ff7a18">compare:</text>
    <text x="780" y="0" fill="#d8e1e8">baseline, threshold, regression marker</text>
  </g>
</svg>